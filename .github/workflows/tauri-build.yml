name: Build Tauri App

on:
  workflow_dispatch:
  push:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: macos-latest
          #   target: aarch64-apple-darwin
          #   platform: macos-arm64
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          #   platform: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
          # - os: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # - name: Rust cache
      #   uses: swatinem/rust-cache@v2
      #   with:
      #     target: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 30

      - name: Download WebView2 Fixed Runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Download WebView2 Fixed Version Runtime for portable package
          # Using NuGet package (most reliable source)
          # Package: WebView2.Runtime.X64 (correct package name)
          
          # Fetch latest version from NuGet API
          $nugetApiUrl = "https://api.nuget.org/v3-flatcontainer/webview2.runtime.x64/index.json"
          $versionsJson = Invoke-RestMethod -Uri $nugetApiUrl
          $latestVersion = $versionsJson.versions[-1]
          Write-Host "Latest WebView2.Runtime.X64 version: $latestVersion"
          
          # Download the NuGet package
          $nugetPackageUrl = "https://www.nuget.org/api/v2/package/WebView2.Runtime.X64/$latestVersion"
          Write-Host "Downloading from: $nugetPackageUrl"
          Invoke-WebRequest -Uri $nugetPackageUrl -OutFile "webview2.nupkg" -UseBasicParsing
          
          # Extract the package
          Expand-Archive -Path "webview2.nupkg" -DestinationPath "webview2-extracted" -Force
          
          # The runtime files are in the root of the package for WebView2.Runtime.X64
          # Create the final directory
          New-Item -ItemType Directory -Force -Path "webview2-fixed"
          
          # Copy runtime files (they're directly in the package root or in a subfolder)
          if (Test-Path "webview2-extracted/WebView2Loader.dll") {
            Copy-Item -Recurse "webview2-extracted/*" "webview2-fixed/"
          } elseif (Test-Path "webview2-extracted/runtimes/win-x64/native") {
            Copy-Item -Recurse "webview2-extracted/runtimes/win-x64/native/*" "webview2-fixed/"
          } elseif (Test-Path "webview2-extracted/build/native/x64") {
            Copy-Item -Recurse "webview2-extracted/build/native/x64/*" "webview2-fixed/"
          } else {
            # Fallback: copy everything and let the portable packaging handle it
            Copy-Item -Recurse "webview2-extracted/*" "webview2-fixed/"
          }
          
          Write-Host "WebView2 runtime extracted successfully"
          
          # List contents for debugging
          Write-Host "Contents of webview2-fixed:"
          Get-ChildItem -Recurse "webview2-fixed" | Select-Object FullName
          
          # Verify we have the essential DLL
          $dllPath = "webview2-fixed/WebView2Loader.dll"
          if (-not (Test-Path $dllPath)) {
            $foundDll = Get-ChildItem -Recurse "webview2-fixed" -Filter "WebView2Loader.dll" | Select-Object -First 1
            if ($foundDll) {
              Write-Host "Found WebView2Loader.dll at: $($foundDll.FullName)"
            } else {
              Write-Warning "WebView2Loader.dll not found - portable package may not work on systems without WebView2"
            }
          }

      - name: Create portable package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p portable/OpenScreen
          
          # Copy main executable
          cp src-tauri/target/${{ matrix.target }}/release/OpenScreen.exe portable/OpenScreen/
          
          # Copy WebView2 fixed runtime (required for portable version)
          if [ -d "webview2-fixed" ]; then
            cp -r webview2-fixed/* portable/OpenScreen/ 2>/dev/null || true
          fi
          
          # Copy resources from the correct location
          # Tauri bundles resources into the exe, but for portable we need to include them separately
          # Resources are embedded in the bundle, extract from _up_ directory if it exists
          if [ -d "src-tauri/target/${{ matrix.target }}/release/_up_" ]; then
            mkdir -p portable/OpenScreen/assets
            cp -r src-tauri/target/${{ matrix.target }}/release/_up_/public/wallpapers portable/OpenScreen/assets/ 2>/dev/null || true
            cp -r src-tauri/target/${{ matrix.target }}/release/_up_/public/wasm portable/OpenScreen/assets/ 2>/dev/null || true
          fi
          
          # Also try to copy from bundle nsis location
          if [ -d "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/OpenScreen_${{ github.ref_name }}_x64-setup/nsis/_up_" ]; then
            mkdir -p portable/OpenScreen/assets
            cp -r src-tauri/target/${{ matrix.target }}/release/bundle/nsis/OpenScreen_${{ github.ref_name }}_x64-setup/nsis/_up_/public/wallpapers portable/OpenScreen/assets/ 2>/dev/null || true
            cp -r src-tauri/target/${{ matrix.target }}/release/bundle/nsis/OpenScreen_${{ github.ref_name }}_x64-setup/nsis/_up_/public/wasm portable/OpenScreen/assets/ 2>/dev/null || true
          fi
          
          # List contents for debugging
          echo "Portable package contents:"
          ls -laR portable/OpenScreen/
          
          cd portable
          7z a -tzip ../OpenScreen-${{ github.ref_name }}-windows-portable.zip OpenScreen

      - name: Upload portable artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.platform }}-portable
          path: OpenScreen-*-windows-portable.zip
          retention-days: 30

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 30

