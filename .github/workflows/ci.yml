name: CI

on:
  push:

jobs:
  # ============ 共享基础检查 ============
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build-vite:
    name: Build Vite (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build-vite

  # ============ Electron Legacy ============
  electron-build:
    name: Electron Legacy Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Electron legacy
        run: npm run build-vite
        env:
          NODE_ENV: production

  e2e-electron:
    name: E2E Tests (Electron Legacy - Linux)
    runs-on: ubuntu-latest
    needs: [electron-build]
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build-vite
      - run: xvfb-run --auto-servernum npm run test:e2e
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-logs-linux
          path: |
            test-results/**/*.log
            test-results/**/stderr.txt
            test-results/**/stdout.txt
          retention-days: 7
          include-hidden-files: false

  e2e-electron-windows:
    name: E2E Tests (Electron Legacy - Windows)
    runs-on: windows-latest
    needs: [electron-build]
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run build-vite
      - name: Run E2E tests (All tests)
        run: npm run test:e2e
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-logs-windows
          path: |
            test-results/**/*.log
            test-results/**/stderr.txt
            test-results/**/stdout.txt
          retention-days: 7
          include-hidden-files: false

